services:
  - type: web
    name: chatgpt-exporter
    runtime: node
    buildCommand: npm install && npx playwright install chromium && npm run build
    startCommand: npm start
    envVars:
      - key: PORT
        value: 3001
      - key: NODE_ENV
        value: production
    plan: starter
    region: frankfurt
    healthCheckPath: /api/health
    autoDeploy: true
